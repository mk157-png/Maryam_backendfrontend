<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="resetpassword.css">
    <script src="LoginValidation.js" ></script>
</head>
<body>
    <div class="wrapper">
        <div class="left-panel">
            <h1>Reset Password</h1>
            <form id="reset-password-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="input-field" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="newpass">New Password</label>
                    <input type="password" class="input-field" id="newpass" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label for="confirmpass">Confirm Password</label>
                    <input type="password" class="input-field" id="confirmpass" placeholder="Confirm Password" required>
                </div>
                <button class="reset-btn" type="submit">Send reset link</button>
                <a href="newindex.html" class="back-link">← Back to Login</a>
            </form>
        </div>
        <div class="right-panel">
            <h1>Security First</h1>
            <ul>
                <li>✔ We'll never ask for your password</li>
                <li>✔ Link expires in 30 minutes</li>
                <li>✔ Contact support if you have trouble</li>
            </ul>
            <a href="faq.html" class="faq-link">Visit Our FAQs Page </a>
        </div>
    </div>
</body>
</html>
